# devdebug.yaml -- custom error pattern config
# Generated by: devdebug init

patterns:
  - name: "Socket Error"
    regex: "(?i)setsockopt.*failed"

  - name: "Protocol Error"
    keyword: "proterr"

  - name: "Warning Event"
    keyword: "warning"

  - name: "EDC Error Code"
    regex: "EDC[0-9]+[A-Z]"

  - name: "Auth Failure"
    keyword: "unauthorized"

  - name: "5xx HTTP Error"
    regex: "HTTP [5][0-9]{2}"

  - name: "Retry Exhausted"
    regex: "(?i)failed after [0-9]+ retr"

  - name: "DB Down"
    keyword: "database unreachable"

